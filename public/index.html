<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Atualizar Localização - Bling</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Atualizar Localização de Produto</h1>

    <form id="form-buscar">
      <label for="tipo-busca">Buscar por:</label>
      <select id="tipo-busca">
        <option value="sku">SKU</option>
        <option value="ean">EAN</option>
      </select>
      <input type="text" id="valor-busca" placeholder="Digite o SKU ou EAN" required>
      <button type="submit">Buscar Produto</button>
    </form>

    <div id="info-produto" style="display:none;">
      <p><strong>Nome:</strong> <span id="nome-produto"></span></p>
      <p><strong>Imagem:</strong></p>
      <img id="imagem-produto" src="" alt="Imagem do Produto" style="max-width: 200px; display: none;" />
      <p><strong>Localização atual:</strong> <span id="localizacao-atual"></span></p>

      <form id="form-atualizar">
        <input type="text" id="localizacao" placeholder="Nova Localização" required>
        <button type="submit">Atualizar Localização</button>
      </form>
    </div>

    <div id="mensagem"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
